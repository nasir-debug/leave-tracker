services:
  - type: web
    name: leave-tracker
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --preload --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LEAVE_TRACKER_ENV
        value: production
      - key: LEAVE_TRACKER_JWT_SECRET
        generateValue: true
      # Paste your Neon (or other Postgres) connection string here. Required —
      # the free plan has no persistent disk, so without this the SQLite
      # fallback would lose all data on every restart/redeploy.
      - key: DATABASE_URL
        sync: false
      # Set these two to create the first admin login on first deploy.
      # You can remove them from the Render dashboard after first login.
      - key: LEAVE_TRACKER_ADMIN_EMAIL
        sync: false
      - key: LEAVE_TRACKER_ADMIN_PASSWORD
        sync: false
